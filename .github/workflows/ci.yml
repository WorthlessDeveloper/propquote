name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate: the dependency-light crates (core, obric, replay). Fast, fully verified.
  test:
    name: fmt + clippy + test (light crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check (all crates)
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

      - name: Doc
        run: cargo doc --no-deps

  # Advisory: compile the heavy LiteSVM ground-truth crate. Allowed to fail so a hiccup in the
  # large Solana dependency tree never turns the badge red; the gate above is the source of truth.
  sim-build:
    name: build propquote-sim (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build sim crate
        run: cargo build -p propquote-sim
