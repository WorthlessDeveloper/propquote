name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Gate: the dependency-light crates (core, obric, replay). Fast, fully verified.
  test:
    name: fmt + clippy + test (light crates)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Pinned (not @stable) so new clippy lints can't redden the gate on a toolchain bump.
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check (all crates)
        run: cargo fmt --all --check

      - name: Clippy (advisory — does not gate)
        continue-on-error: true
        run: cargo clippy --all-targets

      - name: Test
        run: cargo test --all-targets

      - name: Doc
        run: cargo doc --no-deps
